<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAIISM AI Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <button id="new-chat-btn">+ New Chat</button>
            <ul id="chat-list"></ul>
        </aside>

        <div class="chat-container">
            <header class="chat-header">
                <button id="menu-btn">☰</button>
                <h1>SAI-AI</h1>
                <div class="header-actions">
                    <button id="api-key-btn" title="API Key Settings">🔑 API</button>
                    <button id="settings-btn" title="Chat Instructions">⚙️ Inst</button>
                </div>
            </header>
            
            <main class="chat-box" id="chat-box">
                <!-- Messages will load here -->
            </main>

            <div id="image-preview-container" class="hidden">
                <img id="image-preview" src="" alt="Preview">
                <button id="remove-image-btn">❌</button>
            </div>

            <footer class="chat-input-area">
                <input type="file" id="file-input" accept="image/*" class="hidden">
                <button id="attach-btn" title="Upload Photo">📎</button>
                <input type="text" id="user-input" placeholder="Type your message...">
                <button id="send-btn">Send</button>
            </footer>
        </div>
    </div>

    <!-- Chat Instructions Modal -->
    <div id="inst-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Chat Instructions (Memory)</h2>
            <p>Indha chat ku mattum specific ana instructions add pannikalam:</p>
            <textarea id="sys-inst-input" rows="8" placeholder="Enter system instructions here..."></textarea>
            <div class="modal-actions">
                <button id="close-modal-btn">Cancel</button>
                <button id="save-inst-btn">Save Rules</button>
            </div>
        </div>
    </div>

    <!-- API Key Settings Modal -->
    <div id="api-modal" class="modal hidden">
        <div class="modal-content">
            <h2>API Settings</h2>
            <p>Unoda Gemini API key ah inga paste pannu (Idhu un browser la mattum dhan safe ah save aagum):</p>
            <input type="password" id="api-key-input" placeholder="Enter your API Key here...">
            <div class="modal-actions">
                <button id="close-api-btn">Cancel</button>
                <button id="save-api-btn">Save Key</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
